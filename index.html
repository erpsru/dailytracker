<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprint Tracker (Local Storage)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .today-card { 
            border: 2px solid #3b82f6; 
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); 
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen pb-12">

    <!-- Top Navigation Dashboard -->
    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50 px-4 py-4 shadow-md">
        <div class="max-w-4xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-xl font-bold text-white tracking-wide">⚡ LOCAL SPRINT TRACKER</h1>
                <p class="text-xs text-green-400 font-mono">● Active Mode: Local Browser Autosave</p>
            </div>
            
            <!-- Sprint Length Controller -->
            <div class="flex items-center gap-2 bg-gray-950 p-1.5 rounded-lg border border-gray-700">
                <span class="text-xs text-gray-400 px-2">Sprint Days:</span>
                <select id="sprintDaysSelect" onchange="changeSprintLength(this.value)" class="bg-gray-900 text-xs text-white rounded px-2 py-1 border border-gray-700 focus:outline-none focus:border-blue-500">
                    <option value="10">10 Days</option>
                    <option value="30" selected>30 Days</option>
                    <option value="45">45 Days</option>
                    <option value="60">60 Days</option>
                </select>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-6">
        <!-- Dashboard Cards Area -->
        <div id="trackerContainer" class="space-y-6">
            <!-- Dynamic days will generate automatically here -->
        </div>
    </main>

    <script>
        // Target Setup Configuration
        const START_DATE = new Date(2026, 6, 13); // 13 July 2026 (Month index is 0-based)
        let totalDays = parseInt(localStorage.getItem('sprint_total_days')) || 30;
        
        // Load existing data or create an empty object
        let appData = JSON.parse(localStorage.getItem('sprint_tracker_data')) || {};

        // Sync dropdown to stored preference
        document.getElementById('sprintDaysSelect').value = totalDays;

        function changeSprintLength(newLength) {
            totalDays = parseInt(newLength);
            localStorage.setItem('sprint_total_days', totalDays);
            buildTrackerUI();
        }

        function buildTrackerUI() {
            const container = document.getElementById('trackerContainer');
            container.innerHTML = "";
            
            // Get today's system date adjusted to ignore timestamp hours
            const today = new Date();
            const todayString = today.toLocaleDateString('en-GB'); // "DD/MM/YYYY"

            let todayCardElement = null;

            for (let i = 0; i < totalDays; i++) {
                const currentDayNum = i + 1;
                
                // Calculate calendar date for this specific card
                const currentCardDate = new Date(START_DATE);
                currentCardDate.setDate(START_DATE.getDate() + i);
                
                // Formats date nicely: "13 Jul 2026 (Mon)"
                const displayDate = currentCardDate.toLocaleDateString('en-GB', {
                    day: 'numeric', month: 'short', year: 'numeric'
                });
                const displayDayOfWeek = currentCardDate.toLocaleDateString('en-GB', { weekday: 'short' });
                const finalDateLabel = `${displayDate} (${displayDayOfWeek})`;

                // Verify if this specific card matches today's exact calendar date
                const isToday = currentCardDate.toLocaleDateString('en-GB') === todayString;

                // Ensure data keys exist for this day
                if (!appData[currentDayNum]) {
                    appData[currentDayNum] = {};
                }

                const dayCard = document.createElement('div');
                dayCard.className = `bg-gray-800 rounded-xl p-5 border border-gray-700 transition-all ${isToday ? 'today-card' : ''}`;
                if (isToday) todayCardElement = dayCard;

                let testRowsHtml = "";
                for (let t = 1; t <= 6; t++) {
                    const mockKeyName = `T${t}_Name`;
                    const mockKeyScore = `T${t}_Score`;
                    const mockKeyDone = `T${t}_Done`;

                    const valName = appData[currentDayNum][mockKeyName] || "";
                    const valScore = appData[currentDayNum][mockKeyScore] || "";
                    const valDone = appData[currentDayNum][mockKeyDone] === true;

                    testRowsHtml += `
                        <div class="grid grid-cols-12 gap-2 items-center border-b border-gray-700/40 py-2 last:border-0">
                            <span class="col-span-2 text-[10px] font-bold text-gray-500 tracking-wider">MOCK ${t}</span>
                            
                            <input type="text" value="${escapeHtml(valName)}" placeholder="Mock Name" 
                                   oninput="saveLocalData(${currentDayNum}, '${mockKeyName}', this.value)"
                                   class="col-span-5 bg-gray-900 text-xs text-white rounded px-2 py-1.5 border border-gray-700 focus:outline-none focus:border-blue-500">
                            
                            <input type="number" value="${valScore}" placeholder="Score" 
                                   oninput="saveLocalData(${currentDayNum}, '${mockKeyScore}', this.value)"
                                   class="col-span-3 bg-gray-900 text-xs text-center text-white rounded px-2 py-1.5 border border-gray-700 focus:outline-none focus:border-blue-500">
                            
                            <div class="col-span-2 flex justify-center">
                                <input type="checkbox" ${valDone ? 'checked' : ''} 
                                       onchange="saveLocalData(${currentDayNum}, '${mockKeyDone}', this.checked)"
                                       class="w-4 h-4 rounded text-blue-600 bg-gray-900 border-gray-700 focus:ring-blue-500 cursor-pointer">
                            </div>
                        </div>
                    `;
                }

                dayCard.innerHTML = `
                    <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
                        <div>
                            <h3 class="text-base font-bold text-white">Day ${currentDayNum}</h3>
                            <p class="text-xs text-gray-400">${finalDateLabel}</p>
                        </div>
                        ${isToday ? '<span class="bg-blue-600 text-white text-[10px] uppercase font-bold tracking-widest px-2.5 py-1 rounded-full animate-pulse">Today</span>' : ''}
                    </div>
                    <div class="space-y-1">
                        ${testRowsHtml}
                    </div>
                `;
                container.appendChild(dayCard);
            }

            // Auto-scroll screen down straight to today's card instantly so you don't scroll manually
            if (todayCardElement) {
                setTimeout(() => {
                    todayCardElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 200);
            }
        }

        function saveLocalData(dayNum, field, value) {
            if (!appData[dayNum]) appData[dayNum] = {};
            appData[dayNum][field] = value;
            
            // Push changes instantly to device LocalStorage memory
            localStorage.setItem('sprint_tracker_data', JSON.stringify(appData));
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        // Initialize UI engine
        buildTrackerUI();
    </script>
</body>
</html>
