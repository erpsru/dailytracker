<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rajveer Singh - 50-Day Mock Test Sprint Tracker</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <style>
    /* -------------------------------------------------------------
       CUSTOM PROPERTIES & RESET
    ------------------------------------------------------------- */
    :root {
      --bg-main: #0A0C18;
      --card-bg: rgba(20, 24, 46, 0.65);
      --card-bg-nested: rgba(30, 37, 68, 0.5);
      --border-color: rgba(255, 255, 255, 0.08);
      --border-focus: #22D3EE;
      
      --text-primary: #F3F4F6;
      --text-secondary: #9CA3AF;
      --text-muted: #6B7280;
      
      --color-violet: #8B5CF6;
      --color-cyan: #22D3EE;
      --color-pink: #F472B6;
      --color-success: #10B981;
      --color-success-glow: rgba(16, 185, 129, 0.25);

      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      padding-bottom: 4rem;
    }

    /* -------------------------------------------------------------
       BACKGROUND ANIMATED BLOBS
    ------------------------------------------------------------- */
    .blob-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -2;
      overflow: hidden;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.25;
      mix-blend-mode: screen;
    }

    .blob-1 {
      background: var(--color-violet);
      top: -10%;
      left: -10%;
      animation: float-blob-1 25s infinite alternate ease-in-out;
    }

    .blob-2 {
      background: var(--color-cyan);
      bottom: -10%;
      right: -10%;
      animation: float-blob-2 30s infinite alternate ease-in-out;
    }

    .blob-3 {
      background: var(--color-pink);
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: float-blob-3 28s infinite alternate ease-in-out;
    }

    @keyframes float-blob-1 {
      0% { transform: translate(0px, 0px) scale(1); }
      50% { transform: translate(80px, 60px) scale(1.1); }
      100% { transform: translate(-40px, 120px) scale(0.9); }
    }

    @keyframes float-blob-2 {
      0% { transform: translate(0px, 0px) scale(1); }
      50% { transform: translate(-100px, -80px) scale(0.9); }
      100% { transform: translate(50px, -40px) scale(1.15); }
    }

    @keyframes float-blob-3 {
      0% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-40%, -60%) scale(1.05); }
      100% { transform: translate(-60%, -40%) scale(0.95); }
    }

    /* Respect Reduced Motion */
    @media (prefers-reduced-motion: reduce) {
      .blob, .gradient-text, .day-card, .stat-tile, .btn-export {
        animation: none !important;
        transition: none !important;
        transform: none !important;
      }
    }

    /* -------------------------------------------------------------
       CONTAINER & HEADER
    ------------------------------------------------------------- */
    .app-container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .eyebrow {
      font-family: var(--font-mono);
      color: var(--color-cyan);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }

    .gradient-text {
      font-family: var(--font-display);
      font-size: 2.75rem;
      font-weight: 700;
      background: linear-gradient(to right, #8B5CF6, #22D3EE, #F472B6, #8B5CF6);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: textShimmer 6s linear infinite;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    @keyframes textShimmer {
      to { background-position: 200% center; }
    }

    .date-span {
      font-family: var(--font-mono);
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    /* -------------------------------------------------------------
       DASHBOARD PLATFORM (TOP TILES)
    ------------------------------------------------------------- */
    .dashboard {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    @media (min-width: 768px) {
      .dashboard {
        grid-template-columns: 1.2fr 2fr;
      }
    }

    /* Glass Panels Basis */
    .glass-panel {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    /* Circular Progress Graphic Widget */
    .progress-ring-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
    }

    .ring-container {
      position: relative;
      width: 140px;
      height: 140px;
      margin-bottom: 1rem;
    }

    .ring-svg {
      transform: rotate(-90deg);
      width: 140px;
      height: 140px;
    }

    .ring-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.05);
      stroke-width: 10;
    }

    .ring-fill {
      fill: none;
      stroke: url(#ring-gradient);
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 408.4; /* 2 * pi * r (r=65) */
      stroke-dashoffset: 408.4;
      transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .ring-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-mono);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .ring-label {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    /* Analytics Tiles Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    @media (min-width: 480px) {
      .stats-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .stat-tile {
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.25rem;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .stat-tile:hover {
      transform: translateY(-4px);
      border-color: rgba(34, 211, 238, 0.3);
    }

    .stat-val {
      font-family: var(--font-mono);
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .stat-tile:nth-child(1) .stat-val { color: var(--color-violet); }
    .stat-tile:nth-child(2) .stat-val { color: var(--color-cyan); }
    .stat-tile:nth-child(3) .stat-val { color: var(--color-pink); }

    .stat-lbl {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 500;
      line-height: 1.3;
    }

    /* Actions row inside stats wrap */
    .actions-panel {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-top: 0.5rem;
    }

    .btn-export {
      background: linear-gradient(90deg, var(--color-violet), var(--color-cyan));
      color: #0A0C18;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      padding: 0.8rem 1.6rem;
      border-radius: 8px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-export:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(34, 211, 238, 0.4);
    }

    .btn-export:focus-visible {
      outline: 2px solid var(--border-focus);
      outline-offset: 2px;
    }

    /* -------------------------------------------------------------
       SPRINT ACCORDION TIMELINE
    ------------------------------------------------------------- */
    .timeline-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      margin-bottom: 1.25rem;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .timeline-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }

    .accordion-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .day-card {
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
    }

    .day-card.today-highlight {
      border-color: var(--color-cyan);
      box-shadow: 0 0 15px rgba(34, 211, 238, 0.15);
    }

    .day-card.day-complete {
      border-color: rgba(16, 185, 129, 0.4);
    }

    /* Header Trigger Accordion Button */
    .day-header-btn {
      width: 100%;
      background: transparent;
      border: none;
      color: inherit;
      text-align: left;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      cursor: pointer;
      font-family: inherit;
    }

    @media (min-width: 640px) {
      .day-header-btn {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 1.5rem;
      }
    }

    .day-header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .day-number {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      background: rgba(255, 255, 255, 0.06);
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }

    .day-card.today-highlight .day-number {
      background: rgba(34, 211, 238, 0.1);
      color: var(--color-cyan);
      border-color: rgba(34, 211, 238, 0.3);
    }

    .day-date {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 500;
    }

    /* Today Tag Pulsing Badge */
    .badge-today {
      background: var(--color-cyan);
      color: #0A0C18;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      letter-spacing: 0.05em;
      animation: pulseGlow 2s infinite alternate ease-in-out;
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 4px rgba(34, 211, 238, 0.4); opacity: 0.9; }
      100% { box-shadow: 0 0 12px rgba(34, 211, 238, 0.8); opacity: 1; }
    }

    /* Card Mini Progress Strip Indicator */
    .day-progress-wrapper {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
      max-width: 320px;
    }

    .mini-track {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
    }

    .mini-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--color-violet), var(--color-cyan));
      border-radius: 10px;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s ease;
    }

    .day-card.day-complete .mini-fill {
      background: var(--color-success);
      box-shadow: 0 0 8px var(--color-success-glow);
    }

    .mini-txt {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-secondary);
      min-width: 45px;
      text-align: right;
    }

    /* Chevron Indicator */
    .chevron-icon {
      width: 20px;
      height: 20px;
      stroke: var(--text-muted);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.3s ease, stroke 0.3s ease;
      align-self: flex-end;
    }

    @media (min-width: 640px) {
      .chevron-icon {
        align-self: center;
      }
    }

    .day-card.expanded .chevron-icon {
      transform: rotate(180deg);
      stroke: var(--text-primary);
    }

    /* Accordion Grid Animation Engine */
    .accordion-content {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .day-card.expanded .accordion-content {
      grid-template-rows: 1fr;
    }

    .accordion-inner {
      overflow: hidden;
    }

    /* -------------------------------------------------------------
       TASKS MOCK PANEL ROWS
    ------------------------------------------------------------- */
    .tasks-panel-container {
      padding: 0 1.25rem 1.5rem 1.25rem;
      border-top: 1px solid rgba(255, 255, 255, 0.03);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 0.25rem;
    }

    .task-row {
      background: var(--card-bg-nested);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.75rem;
      align-items: center;
    }

    @media (min-width: 768px) {
      .task-row {
        grid-template-columns: 2fr 3fr 1.5fr auto;
        gap: 1.25rem;
      }
    }

    .task-label {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* Form Fields Styling */
    .input-wrapper {
      width: 100%;
    }

    .field-input {
      width: 100%;
      background: rgba(10, 12, 24, 0.8);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.9rem;
      padding: 0.55rem 0.75rem;
      border-radius: 6px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .field-input:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.15);
    }

    .field-input::placeholder {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* Score Box Wrap */
    .score-container {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .score-input {
      width: 70px;
      text-align: center;
      font-family: var(--font-mono);
    }

    .score-max-lbl {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    /* Custom Animated Checkbox Engine */
    .custom-checkbox-container {
      display: inline-flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    .hidden-checkbox {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .checkbox-svg {
      width: 26px;
      height: 26px;
      overflow: visible;
    }

    .checkbox-box {
      fill: rgba(10, 12, 24, 0.8);
      stroke: var(--border-color);
      stroke-width: 2;
      rx: 6px;
      transition: stroke 0.25s ease, fill 0.25s ease, filter 0.25s ease;
    }

    .checkbox-tick {
      fill: none;
      stroke: #0A0C18;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 24;
      stroke-dashoffset: 24;
      transition: stroke-dashoffset 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Checked and Interaction States */
    .hidden-checkbox:checked + .checkbox-svg .checkbox-box {
      fill: var(--color-cyan);
      stroke: var(--color-cyan);
      filter: drop-shadow(0 0 6px rgba(34, 211, 238, 0.6));
    }

    .hidden-checkbox:checked + .checkbox-svg .checkbox-tick {
      stroke-dashoffset: 0;
    }

    .hidden-checkbox:focus-visible + .checkbox-svg .checkbox-box {
      stroke: var(--border-focus);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.2);
    }

    /* -------------------------------------------------------------
       ACCESSIBILITY UTILITIES
    ------------------------------------------------------------- */
    .day-header-btn:focus-visible {
      outline: 2px solid var(--border-focus);
      background: rgba(255, 255, 255, 0.02);
    }
  </style>
</head>
<body>

  <div class="blob-container">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="app-container">
    
    <header>
      <div class="eyebrow">Sprint Framework Matrix</div>
      <h1 class="gradient-text">Rajveer Singh's 50-Day Mock Tracker</h1>
      <div class="date-span">13 July 2026 — 31 August 2026</div>
    </header>

    <section class="dashboard">
      
      <div class="glass-panel progress-ring-card">
        <div class="ring-container">
          <svg class="ring-svg">
            <defs>
              <linearGradient id="ring-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#8B5CF6" />
                <stop offset="100%" stop-color="#22D3EE" />
              </linearGradient>
            </defs>
            <circle class="ring-bg" cx="70" cy="70" r="65"></circle>
            <circle class="ring-fill" id="overall-ring-fill" cx="70" cy="70" r="65"></circle>
          </svg>
          <div class="ring-text" id="overall-percentage-txt">0%</div>
        </div>
        <div class="ring-label">Overall Completion</div>
      </div>

      <div class="glass-panel stats-grid">
        <div class="stat-tile">
          <div class="stat-val" id="stats-days-complete">0</div>
          <div class="stat-lbl">Days Fully<br>Completed</div>
        </div>
        <div class="stat-tile">
          <div class="stat-val" id="stats-tasks-ticked">0</div>
          <div class="stat-lbl">Total Mocks<br>Evaluated</div>
        </div>
        <div class="stat-tile">
          <div class="stat-val" id="stats-streak">0</div>
          <div class="stat-lbl">Current Daily<br>Streak (Days)</div>
        </div>
        
        <div class="actions-panel">
          <button class="btn-export" id="btn-export-pdf" aria-label="Export execution timeline data to PDF document format">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Download progress PDF
          </button>
        </div>
      </div>

    </section>

    <section>
      <h2 class="timeline-title">50-Day Execution Timeline Blueprint</h2>
      <div class="accordion-list" id="sprint-accordion-target">
